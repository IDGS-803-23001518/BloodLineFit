<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BloodLine Fit – Iniciar Sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100 px-4"
  style="background-image: url('{{url_for('static',filename='img/FondoBLF.jpg')}}'); background-size: cover; background-color: #0a0a0a;">

  <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden">

    <div class="px-6 py-5 text-center" style="background-color:#1a1a1a;">
      <div class=" mx-auto rounded-full flex items-center justify-center mb-3"
        style="background-color:#1a1a1a;">
        <div class="bg-black p-1.5 rounded-xl shadow-lg">
          <img src="{{url_for('static',filename='img/LogoBLF.jpeg')}}" class="h-20 w-20" alt="BloodLine Fit Logo" />
        </div>
      </div>
      <h1 class="text-xl font-bold text-white tracking-wide">BloodLine Fit</h1>
      <p class="text-gray-400 text-xs mt-1">Sistema de Gestión</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="px-6 pt-4 space-y-2">
      {% for category, message in messages %}
      <div class="px-4 py-3 rounded-xl text-sm font-semibold
              {% if category == 'success' %}bg-green-100 text-green-700 border border-green-300
              {% else %}bg-red-100 text-red-700 border border-red-300{% endif %}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="p-6">
      <form method="POST" action="{{ url_for('auth.login_post') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Usuario</label>
          <input type="text" name="nombre_usuario" required autofocus placeholder="Nombre de usuario" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition">
        </div>

        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
          <input type="password" name="contrasena" required placeholder="••••••••" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition">
        </div>

        <button type="submit" class="w-full py-2.5 rounded-lg text-white font-bold text-sm tracking-wide
                 transition hover:brightness-110 shadow-md" style="background-color:#ef4444;">
          Iniciar Sesión
        </button>
      </form>
    </div>

  </div>

</body>

</html>
