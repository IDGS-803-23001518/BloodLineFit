<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>BloodLine Fit - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{url_for('static',filename='dist/output.css')}}">
    <style>
        .sidebar-gradient {
            background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
        }

        .menu-item-hover {
            transition: all 0.3s ease;
        }

        .menu-item-hover:hover {
            background-color: rgba(220, 38, 38, 0.15);
            color: #ef4444;
            transform: translateX(5px);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @media (min-width: 1024px) {
            .menu-text {
                font-size: 0.9rem;
            }

            .submenu-text {
                font-size: 0.8rem;
            }
        }

        main {
            transition: margin-left 0.3s ease-in-out;
        }

        @media (min-width: 769px) {
            body:not(.sidebar-closed) main {
                margin-left: 288px;
            }

            body.sidebar-closed main {
                margin-left: 0;
            }

            body:not(.sidebar-closed) .sidebar-toggle-button {
                margin-left: 288px;
            }

            body.sidebar-closed .sidebar-toggle-button {
                margin-left: 0;
            }

            #drawer-navigation {
                transition: transform 0.3s ease-in-out;
            }

            body:not(.sidebar-closed) #drawer-navigation {
                transform: translateX(0) !important;
            }

            body.sidebar-closed #drawer-navigation {
                transform: translateX(-100%) !important;
            }

            [drawer-backdrop] {
                display: none !important;
            }

            main {
                position: relative;
                z-index: 1;
                pointer-events: auto;
            }
        }

        @media (max-width: 768px) {
            main {
                margin-left: 0;
                padding: 0.5rem;
            }

            #drawer-navigation {
                width: 85%;
                max-width: 280px;
                transition: transform 0.3s ease-in-out;
                transform: translateX(-100%);
            }

            .container {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }

            .sidebar-toggle-button {
                margin-left: 0 !important;
            }

            #drawer-navigation.open-mobile {
                transform: translateX(0) !important;
            }
        }

        .usuario-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .usuario-card:active {
            transform: scale(0.98);
        }

        .sidebar-section-label {
            padding: 0.5rem 0.75rem 0.25rem;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(239, 68, 68, 0.6);
        }

        .sidebar-separator {
            border-top: 1px solid rgba(239, 68, 68, 0.2);
            margin: 0.5rem 0.5rem;
        }

        .sidebar-toggle-button {
            transition: margin-left 0.3s ease-in-out;
        }

        .logo-red {
            color: #ef4444;
        }
    </style>
</head>

<body class="bg-center bg-fixed bg-no-repeat"
    style="background-image: url('{{url_for('static',filename='img/FondoBLF.jpg')}}'); background-size: cover; background-color: #0a0a0a;">

    <div class="fixed top-0 left-0 z-30 h-16 flex items-center sidebar-toggle-button">
        <button type="button" id="sidebar-toggle-btn"
            class="inline-flex items-center justify-center p-3 ml-4 text-white bg-[#1a1a1a] rounded-xl hover:bg-[#2a2a2a] focus:outline-none focus:ring-2 focus:ring-red-600 transition-all duration-300 shadow-lg hover:shadow-xl">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>

    <div id="drawer-navigation"
        class="fixed top-0 left-0 z-30 w-72 h-full p-4 overflow-y-auto sidebar-gradient border-r border-red-600 shadow-2xl no-scrollbar"
        tabindex="-1" aria-labelledby="drawer-navigation-label">

        <div class="border-b border-red-600 pb-3 mb-3 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="bg-black p-1.5 rounded-xl shadow-lg">
                    <img src="{{url_for('static',filename='img/LogoBLF.jpeg')}}" class="h-8 w-8"
                        alt="BloodLine Fit Logo" />
                </div>
                <div>
                    <span class="block text-base font-bold text-white">BloodLine <span class="text-red-600">Fit</span></span>
                </div>
            </div>
            <button type="button" id="sidebar-hide-btn"
                class="text-gray-300 bg-transparent hover:bg-white hover:bg-opacity-10 rounded-lg w-7 h-7 flex items-center justify-center transition-all duration-300">
                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M6 18 17.94 6M18 18 6.06 6" />
                </svg>
            </button>
        </div>

        <div class="py-1 overflow-y-visible h-[calc(100%-80px)] no-scrollbar">
            <ul class="space-y-0.5 font-medium">

                <li>
                    <a href="/categorias"
                        class="flex items-center px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-red-600 hover:bg-opacity-15 hover:text-red-500 group menu-item-hover menu-text">
                        <svg class="shrink-0 w-4 h-4 transition duration-75 group-hover:text-red-500"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l5 5a2 2 0 01.586 1.414V19a2 2 0 01-2 2H7a2 2 0 01-2-2V5a2 2 0 012-2z" />
                        </svg>
                        <span class="ms-3">Categorías</span>
                    </a>
                </li>

                <li>
                    <a href="/productos"
                        class="flex items-center px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-red-600 hover:bg-opacity-15 hover:text-red-500 group menu-item-hover menu-text">
                        <svg class="shrink-0 w-4 h-4 transition duration-75 group-hover:text-red-500"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                        </svg>
                        <span class="ms-3">Productos</span>
                    </a>
                </li>

                <li>
                    <a href="/clientes"
                        class="flex items-center px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-red-600 hover:bg-opacity-15 hover:text-red-500 group menu-item-hover menu-text">
                        <svg class="shrink-0 w-4 h-4 transition duration-75 group-hover:text-red-500"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                        <span class="ms-3">Clientes</span>
                    </a>
                </li>

                <li>
                    <a href="/usuarios"
                        class="flex items-center px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-red-600 hover:bg-opacity-15 hover:text-red-500 group menu-item-hover menu-text">
                        <svg class="shrink-0 w-4 h-4 transition duration-75 group-hover:text-red-500"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 6v4m0 4h.01M12 2a10 10 0 100 20 10 10 0 000-20z" />
                        </svg>
                        <span class="ms-3">Usuarios</span>
                    </a>
                </li>

                <li>
                    <a href="/pedidos"
                        class="flex items-center px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-red-600 hover:bg-opacity-15 hover:text-red-500 group menu-item-hover menu-text">
                        <svg class="shrink-0 w-4 h-4 transition duration-75 group-hover:text-red-500"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                            </svg>
                        <span class="ms-3">Pedidos</span>
                    </a>
                </li>

                <li>
                    <a href="/pagos"
                        class="flex items-center px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-red-600 hover:bg-opacity-15 hover:text-red-500 group menu-item-hover menu-text">
                        <svg class="shrink-0 w-4 h-4 transition duration-75 group-hover:text-red-500"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H7a3 3 0 00-3 3v8a3 3 0 003 3z" />
                        </svg>
                        <span class="ms-3">Pagos</span>
                    </a>
                </li>


                <div class="sidebar-separator"></div>

                <li>
                    <a href=""
                        class="flex items-center px-3 py-2 text-sm text-gray-200 rounded-xl hover:bg-red-600 hover:bg-opacity-20 hover:text-red-500 group menu-item-hover menu-text">
                        <svg class="shrink-0 w-4 h-4 transition duration-75 group-hover:text-red-500"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        <span class="ms-3">Cerrar Sesión</span>
                    </a>
                </li>

            </ul>
        </div>
    </div>

    <main>
        {% block container %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const drawer = document.getElementById('drawer-navigation');
            const toggleBtn = document.getElementById('sidebar-toggle-btn');
            const hideBtn = document.getElementById('sidebar-hide-btn');

            let isMobileOpen = false;

            function updateDesktopSidebar() {
                if (window.innerWidth >= 769) {
                    const isClosed = document.body.classList.contains('sidebar-closed');
                    drawer.style.transform = isClosed ? 'translateX(-100%)' : 'translateX(0)';
                }
            }

            function openMobileSidebar() {
                if (window.innerWidth < 769) {
                    drawer.classList.add('open-mobile');
                    isMobileOpen = true;
                }
            }

            function closeMobileSidebar() {
                if (window.innerWidth < 769) {
                    drawer.classList.remove('open-mobile');
                    isMobileOpen = false;
                }
            }

            function openDesktopSidebar() {
                if (window.innerWidth >= 769) {
                    document.body.classList.remove('sidebar-closed');
                    drawer.style.transform = 'translateX(0)';
                }
            }

            function closeDesktopSidebar() {
                if (window.innerWidth >= 769) {
                    document.body.classList.add('sidebar-closed');
                    drawer.style.transform = 'translateX(-100%)';
                }
            }

            if (toggleBtn) {
                toggleBtn.addEventListener('click', function (e) {
                    e.preventDefault();
                    if (window.innerWidth >= 769) {
                        document.body.classList.contains('sidebar-closed')
                            ? openDesktopSidebar()
                            : closeDesktopSidebar();
                    } else {
                        isMobileOpen ? closeMobileSidebar() : openMobileSidebar();
                    }
                });
            }

            if (hideBtn) {
                hideBtn.addEventListener('click', function (e) {
                    e.preventDefault();
                    window.innerWidth >= 769 ? closeDesktopSidebar() : closeMobileSidebar();
                });
            }

            document.addEventListener('click', function (e) {
                if (window.innerWidth < 769 && isMobileOpen) {
                    if (!drawer.contains(e.target) && !toggleBtn.contains(e.target)) {
                        closeMobileSidebar();
                    }
                }
            });

            window.addEventListener('resize', function () {
                if (window.innerWidth >= 769) {
                    if (isMobileOpen) closeMobileSidebar();
                    updateDesktopSidebar();
                } else {
                    document.body.classList.remove('sidebar-closed');
                    drawer.style.transform = '';
                    closeMobileSidebar();
                }
            });

            if (window.innerWidth >= 769) {
                document.body.classList.remove('sidebar-closed');
                drawer.style.transform = 'translateX(0)';
                drawer.setAttribute('data-drawer-backdrop', 'false');
            } else {
                closeMobileSidebar();
            }
        });
    </script>
</body>

</html>
